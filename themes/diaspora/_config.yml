# 头部菜单，title: link
menu:
  首页: /
  关于: /about
  分类: /categories
  标签: /tags
  博客(未制作迁移): http://blog.yusux.xyz
  nas(目前已关闭): https://nas.yusux.xyz
  nas(ipv6) : http://ipv6-nas.yusux.xyz

# 是否显示目录
TOC: false

# 是否自动播放音乐
autoplay: true

# 默认音乐（随机播放）
mp3: 
    - http://link.hhtjim.com/163/499793448.mp3
    - http://link.hhtjim.com/163/1336969345.mp3
    - http://link.hhtjim.com/163/440355687.mp3
    - http://link.hhtjim.com/163/406339.mp3

# 首页封面图, 为空时取文章的cover作为封面(注意跨域问题,建议使用同源图片)
welcome_cover: /img/welcome-cover.jpg

# 默认文章封面图（随机调用,支持外链）
cover: 
  - /img/cover.jpg
  - /img/welcome-cover.jpg

 
# 是否使用mathjax
mathjax: false


# 是否关闭默认滚动条
scrollbar: true

# 本地搜索,请将索引文件放在网站根目录,或修改主题js文件的path值
local_search:
    # 是否启用
    enable: true

# 是否显示 一言(hitokoto)
hitokoto: true

# 链接(可选:facebook,twitter,github,wechat,email)
links:
    github: https://github.com/Yusux
    email: mailto:KaguraMao@foxmail.com
  
# 备案
beian: 
    # 是否显示备案信息
    enable: false
    # 是否在主页面最底下显示备案信息(虽然丑，但是完全满足规定要求)
    enableFooter: false
    # 备案号
    beianInfo: 冀ICP备xxxxxxx号
    # 链接地址
    link: http://www.beian.miit.gov.cn

# Gitalk 评论插件（https://github.com/gitalk/gitalk）
gitalk:
    # 是否启用评论功能
    enable: true
    # 是否自动展开评论框
    autoExpand: false
    # ID
    githubID: Yusux
    # 应用编号
    clientID: 'fbce40f9ad5282294e9c'
    # 应用秘钥
    clientSecret: '37b16e052a530b0f846062db4289051e99dee45c'
    # issue仓库名
    repo: 'yusux_index'
    # Github名
    owner: 'Yusux'
    # Github名
    admin: ['Yusux']
    # Ensure uniqueness and length less than 50
    id: location.pathname
    # Facebook-like distraction free mode
    distractionFreeMode: false

# 网站关键字
keywords: yusux,index

# 要使用google_analytics进行统计的话，这里需要配置ID
google_analytics: 

# 网站ico
favicon: /img/favicon.png

# rss文件
rss: atom.xml

# search:
path: search.xml
field: all
format: html
limit: 10000
